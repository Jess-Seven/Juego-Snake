<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" type="text/javascript" defer></script> <!--Es para que el script se desacargue al final-->
    <title>Juego Snake</title>
</head>
<body>

    <div id="board"></div> <!--Este seria el fondo donde va a estar corriendo la culebra-->
    <div class="boardInfo"> <!-- Aqui va a estar toda la informacion del juego -->
        <div> <!-- Este es el apartado de los puntos mientras mas frutas coma la snake mas puntos obtendra -->
            Score: <div id="scoreBoard"></div>            
        </div>
        <button id="start">Start</button> <!-- Boton de iniciar para darle play al juego -->
    </div>
    <div id="gameOver">Game Over</div> <!-- Texto de juego terminado -->
    
</body>
</html>
